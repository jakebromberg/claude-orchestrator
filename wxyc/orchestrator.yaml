name: "WXYC ETL Pipeline Unification"
configDir: "./state"
worktreeDir: "./worktrees"
projectRoot: "/Users/jake/Developer/WXYC"
stallTimeout: 900
allowedTools: [Bash, Read, Write, Edit, Glob, Grep, Agent, Skill]

branchPrefix: "feature/etl-"
retryableStatuses: [failed, interrupted]
promptTemplate: "./prompt.md"
claudeArgs:
  - "--add-dir"
  - "{{projectRoot}}"

summary:
  title: "WXYC ETL Pipeline Unification"
  columns:
    - { header: "#", width: 4, value: "issue.number", prefix: "#" }
    - { header: "Slug", width: 32, value: "issue.slug" }
    - { header: "Wave", width: 6, value: "issue.wave" }
    - { header: "Status", width: 14, value: "status" }
    - { header: "Description", width: 50, value: "issue.description" }

# ──────────────────────────────────────────────────────────────────────
# Issues 1-25 map to GitHub issues across 9 repos.
#
# Numbering scheme (sequential 1-25):
#
#   1  = wxyc-etl#1    (1a)     13 = discogs-xml-converter#21 (3a)
#   2  = wxyc-etl#2    (1b)     14 = wikidata-json-filter#1   (3b)
#   3  = wxyc-etl#3    (1c)     15 = wxyc-catalog#1           (3c)
#   4  = wxyc-etl#4    (1d)     16 = wxyc-catalog#2           (3d)
#   5  = wxyc-etl#5    (1e)     17 = discogs-cache#65         (4a)
#   6  = wxyc-etl#6    (1f)     18 = library-metadata-lookup#95 (4b)
#   7  = wxyc-etl#7    (1g)     19 = semantic-index#114       (4c)
#   8  = discogs-cache#63 (2a)  20 = library-metadata-lookup#96 (5a)
#   9  = semantic-index#112 (2b) 21 = library-metadata-lookup#97 (5b)
#  10  = musicbrainz-cache#1 (2c) 22 = library-metadata-lookup#98 (5c)
#  11  = discogs-cache#64 (2d) 23 = semantic-index#115       (5d)
#  12  = semantic-index#113 (2e) 24 = musicbrainz-cache#2     (6a)
#                               25 = wikidata-json-filter#2   (6b)
# ──────────────────────────────────────────────────────────────────────

issues:
  # ── Phase 0: Scaffolding ────────────────────────────────────────────
  # Issue 0 is a synthetic scaffolding step that creates the wxyc-etl
  # repo skeleton so Phase 1 parallel tasks don't conflict on shared
  # files (Cargo.toml, src/lib.rs, module directories).
  - number: 0
    slug: wxyc-etl-scaffold
    dependsOn: []
    description: "Scaffold wxyc-etl repo (Cargo.toml, src/lib.rs, empty module dirs)"
    repo: wxyc-etl
    stallTimeout: 300

  # ── Phase 1: wxyc-etl core modules ─────────────────────────────────
  - number: 1
    slug: wxyc-etl-text
    dependsOn: [0]
    description: "text/ module (normalization, compilation, splitting)"
    repo: wxyc-etl

  - number: 2
    slug: wxyc-etl-pg
